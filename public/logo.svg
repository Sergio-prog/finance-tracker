<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="page-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="page-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="coin-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="coin-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="496" height="496" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Book cover -->
  <rect x="146" y="96" width="220" height="300" rx="10" ry="10" fill="url(#book)" filter="url(#coin-shadow)"/>

  <!-- Left page -->
  <rect x="158" y="106" width="97" height="280" rx="4" ry="4" fill="url(#page-left)"/>
  <!-- Left page lines -->
  <line x1="172" y1="140" x2="240" y2="140" stroke="#d4a34e" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="172" y1="165" x2="232" y2="165" stroke="#d4a34e" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="172" y1="190" x2="236" y2="190" stroke="#d4a34e" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="172" y1="215" x2="220" y2="215" stroke="#d4a34e" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- Center crease -->
  <line x1="255" y1="106" x2="255" y2="386" stroke="#b45309" stroke-width="3" opacity="0.5"/>

  <!-- Right page -->
  <rect x="257" y="106" width="97" height="280" rx="4" ry="4" fill="url(#page-right)"/>
  <!-- Right page lines -->
  <line x1="270" y1="140" x2="338" y2="140" stroke="#d4a34e" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="270" y1="165" x2="330" y2="165" stroke="#d4a34e" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="270" y1="190" x2="334" y2="190" stroke="#d4a34e" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- Bookmark ribbon -->
  <path d="M216 96 L216 380 Q216 398 232 392 L256 376 L280 392 Q296 398 296 380 L296 96" fill="#ef4444" opacity="0.85"/>
  <path d="M216 96 L216 380 Q216 398 232 392 L256 376 L272 392 Q286 398 296 380 L296 96" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.4"/>

  <!-- Coin -->
  <g filter="url(#coin-shadow)">
    <circle cx="335" cy="274" r="60" fill="url(#coin)"/>
    <circle cx="335" cy="274" r="60" fill="url(#coin-shine)"/>
    <circle cx="335" cy="274" r="50" fill="none" stroke="#d97706" stroke-width="2" opacity="0.4"/>
    <!-- Dollar sign -->
    <text x="335" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#92400e" text-anchor="middle" dominant-baseline="central">$</text>
  </g>
</svg>
